# models_llama.yaml — Llama models for local inference via HuggingFace
- alias: llama_1b
  name: meta-llama/Llama-3.2-1B-Instruct
  provider: huggingface
  max_tokens: 8192

- alias: llama_3b
  name: meta-llama/Llama-3.2-3B-Instruct
  provider: huggingface
  max_tokens: 8192

- alias: llama_8b
  name: meta-llama/Llama-3.1-8B-Instruct
  provider: huggingface
  load_in_4bit: true
  max_tokens: 8192
